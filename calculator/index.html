<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
<p></p>

<div class="row" >
  <button class="cal">9</button>
  <button class="cal">8</button>
  <button class="cal">7</button>
  <button class="cal">6</button>
  <button class="cal2">All clear</button>
</div>

<div class="row">
  <button class="cal">5</button>
  <button class="cal">4</button>
  <button class="cal">3</button>
  <button class="cal">2</button>
  <button class="cal2">←</button>
</div>


<div class="row">
  <button class="cal">1</button>
  <button class="cal">0</button>
  <button class="operator">%</button>
  <button class="operator">*</button>
  <button class="operator">+</button>
</div>

<div class="row">
  <button class="operator">-</button>
  <button class="operator">/</button>
  <button class="operator">=</button>
  
</div>

<div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="dom.js"></script>
  </body>
</html>
